name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  WASI_SDK_VERSION: "32"
  WASI_SDK_PATH: /opt/wasi-sdk

jobs:
  build-wasm:
    name: Build WASM plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install WASI SDK
        run: |
          sudo mkdir -p /opt/wasi-sdk
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz" \
            | sudo tar xz --strip-components=1 -C /opt/wasi-sdk

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-wasip1

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-

      - name: Build WASM plugin (release)
        env:
          CARGO_TARGET_WASM32_WASIP1_LINKER: /opt/wasi-sdk/bin/wasm-ld
          CC_wasm32_wasip1: /opt/wasi-sdk/bin/clang
          CXX_wasm32_wasip1: /opt/wasi-sdk/bin/clang++
          AR_wasm32_wasip1: /opt/wasi-sdk/bin/llvm-ar
        run: cargo build --release --target wasm32-wasip1

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: surfer-struct-translator.wasm
          path: target/wasm32-wasip1/release/surfer_struct_translator.wasm

  release:
    name: Create GitHub Release
    needs: build-wasm
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: surfer-struct-translator.wasm

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: surfer_struct_translator.wasm
          generate_release_notes: true
